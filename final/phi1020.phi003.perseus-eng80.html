<!DOCTYPE html>
<html lang="en">
<head>

<title>Statius — Thebaid / Achilleid (Parallel Text)</title>
<style>
@page {
    size: A4 landscape;
    margin: 1.5cm;
}
body {
    font-family: "Helvetica Neue", "Arial", "Segoe UI", sans-serif;
    font-size: 11pt;
    line-height: 1.5;
    margin: 0;
    padding: 20px;
    color: #222;
}
h1 {
    font-size: 16pt;
    margin-bottom: 4px;
}
h2 {
    font-size: 13pt;
    margin-top: 24px;

}
.meta {

    margin-bottom: 16px;
}
table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
}
td {
    vertical-align: top;
    padding: 6px 10px;
    border-bottom: 1px solid #e0e0e0;

    color: #999;

    padding-right: 4px;

}

    width: 8%;

    padding: 6px 4px;

.bar-row { display: flex; align-items: center; margin: 1px 0; }
.bar-label { width: 10px; font-weight: bold; color: #999; }

.bar-fill.high { background: #4caf50; }

.bar-fill.low { background: #f44336; }
.ent-name { font-weight: bold; }
.lex-word { font-style: italic; }

}
td.english {
    font-size: 10.5pt;
    width: 40%;
}
td.empty {
    color: #ccc;
    font-style: italic;
    font-size: 9pt;
}
.fn-ref {
    color: #999;
    font-size: 8pt;
}
.fn-body {
    margin-top: 6px;
    padding-top: 4px;
    border-top: 1px solid #ddd;
}
.fn {
    font-size: 9pt;
    color: #777;
    font-style: italic;
    margin: 2px 0;
}
.fn-marker {
    font-style: normal;
    font-weight: bold;
    color: #999;
}
.heading-text {
    font-size: 9pt;
    color: #888;
    font-style: italic;
    display: block;
    margin-bottom: 4px;
    padding-bottom: 3px;
    border-bottom: 1px dotted #ddd;
}
tr.high td { background-color: #e8f5e9; }
tr.med td { background-color: #fff8e1; }
tr.low td { background-color: #ffebee; }
tr.unmatched td { background-color: #f5f5f5; }
.score {
    font-size: 7pt;
    color: #999;
    float: right;
}
@media print {
    h2 { page-break-before: always; }
    tr { page-break-inside: avoid; }
}
</style>
</head>
